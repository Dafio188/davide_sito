<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Data Globe 3D</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600;700&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Orbitron', sans-serif;
      background: #000;
      overflow: hidden;
    }

    .globe-container {
      width: 100%;
      height: 100vh;
      background: linear-gradient(135deg, #0a0e27 0%, #1a1f3a 50%, #0f1629 100%);
      position: relative;
      overflow: hidden;
    }

    .globe-container::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: radial-gradient(circle at 50% 50%, rgba(59, 130, 246, 0.1) 0%, transparent 50%);
      pointer-events: none;
      z-index: 1;
    }

    #globe-canvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 2;
    }

    .globe-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 3;
      pointer-events: none;
    }

    .globe-title {
      position: absolute;
      top: 40px;
      left: 40px;
      opacity: 0;
      animation: fadeInTitle 1s ease-out 0.5s forwards;
    }

    .title-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(59, 130, 246, 0.1);
      border: 1px solid rgba(59, 130, 246, 0.3);
      padding: 8px 16px;
      border-radius: 100px;
      font-size: 11px;
      font-weight: 700;
      color: #60a5fa;
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 16px;
      box-shadow: 0 0 20px rgba(59, 130, 246, 0.3);
    }

    .main-title {
      font-size: 36px;
      font-weight: 900;
      color: #fff;
      margin-bottom: 8px;
      letter-spacing: -0.02em;
      text-shadow: 0 0 30px rgba(59, 130, 246, 0.5);
    }

    .main-title .highlight {
      background: linear-gradient(135deg, #3b82f6, #8b5cf6, #06b6d4);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: shimmer 3s ease-in-out infinite;
      background-size: 200% auto;
    }

    .sub-title {
      font-size: 14px;
      color: #94a3b8;
      font-weight: 400;
      font-family: 'JetBrains Mono', monospace;
    }

    .stats-panel {
      position: absolute;
      bottom: 40px;
      right: 40px;
      display: flex;
      gap: 20px;
      opacity: 0;
      animation: fadeInStats 1s ease-out 1s forwards;
    }

    .stat-card {
      background: rgba(15, 23, 42, 0.8);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(59, 130, 246, 0.2);
      border-radius: 16px;
      padding: 20px 24px;
      min-width: 140px;
      position: relative;
      overflow: hidden;
    }

    .stat-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 2px;
      background: linear-gradient(90deg, #3b82f6, #8b5cf6);
      opacity: 0.5;
    }

    .stat-icon {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 12px;
      background: linear-gradient(135deg, rgba(59, 130, 246, 0.2), rgba(139, 92, 246, 0.2));
    }

    .stat-icon svg {
      width: 16px;
      height: 16px;
      color: #3b82f6;
    }

    .stat-value {
      font-size: 28px;
      font-weight: 900;
      color: #fff;
      font-family: 'JetBrains Mono', monospace;
      margin-bottom: 4px;
      text-shadow: 0 0 10px rgba(59, 130, 246, 0.5);
    }

    .stat-label {
      font-size: 11px;
      color: #64748b;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .center-pulse {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 300px;
      height: 300px;
      border-radius: 50%;
      border: 1px solid rgba(59, 130, 246, 0.2);
      animation: pulse-ring 3s ease-out infinite;
      z-index: 1;
    }

    .scan-line {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, #3b82f6, transparent);
      animation: scan 4s linear infinite;
      z-index: 4;
      opacity: 0.3;
    }

    @keyframes fadeInTitle {
      from {
        opacity: 0;
        transform: translateY(-20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes fadeInStats {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes pulse-ring {
      0% {
        transform: translate(-50%, -50%) scale(0.8);
        opacity: 0.8;
      }
      100% {
        transform: translate(-50%, -50%) scale(1.5);
        opacity: 0;
      }
    }

    @keyframes scan {
      0% {
        top: 0;
      }
      100% {
        top: 100%;
      }
    }

    @keyframes shimmer {
      0% {
        background-position: 0% 50%;
      }
      50% {
        background-position: 100% 50%;
      }
      100% {
        background-position: 0% 50%;
      }
    }

    @media (max-width: 768px) {
      .globe-title {
        left: 20px;
        top: 20px;
      }

      .main-title {
        font-size: 24px;
      }

      .sub-title {
        font-size: 12px;
      }

      .stats-panel {
        bottom: 20px;
        right: 20px;
        left: 20px;
        flex-direction: column;
        gap: 12px;
      }

      .stat-card {
        min-width: auto;
        padding: 16px 20px;
      }

      .stat-value {
        font-size: 24px;
      }
    }
  </style>

<body>
  <div class="globe-container">
    <div class="center-pulse"></div>
    <div class="center-pulse" style="animation-delay: 1s"></div>
    <div class="center-pulse" style="animation-delay: 2s"></div>
    
    <div class="scan-line"></div>

    <div id="globe-canvas"></div>

    <div class="globe-overlay">
      <div class="globe-title">
        <div class="title-badge">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon>
          </svg>
          GLOBAL NETWORK
        </div>
        <h2 class="main-title">
          <span class="highlight">Connected</span> Intelligence
        </h2>
        <p class="sub-title">Real-time data visualization • AI-powered security</p>
      </div>

      <div class="stats-panel">
        <div class="stat-card">
          <div class="stat-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
              <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
            </svg>
          </div>
          <div class="stat-value" id="stat-nodes">0</div>
          <div class="stat-label">Active Nodes</div>
        </div>

        <div class="stat-card">
          <div class="stat-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline>
            </svg>
          </div>
          <div class="stat-value" id="stat-connections">0</div>
          <div class="stat-label">Connections</div>
        </div>

        <div class="stat-card">
          <div class="stat-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon>
            </svg>
          </div>
          <div class="stat-value" id="stat-data">0TB</div>
          <div class="stat-label">Data Flow</div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  
  <script>
    // Initialize Three.js scene
    const container = document.getElementById('globe-canvas');
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.z = 400;

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setClearColor(0x000000, 0);
    container.appendChild(renderer.domElement);

    // Globe
    const globeGeometry = new THREE.SphereGeometry(80, 64, 64);
    const globeMaterial = new THREE.MeshBasicMaterial({
      color: 0x3b82f6,
      wireframe: true,
      transparent: true,
      opacity: 0.15
    });
    const globe = new THREE.Mesh(globeGeometry, globeMaterial);
    scene.add(globe);

    // Inner glow sphere
    const glowGeometry = new THREE.SphereGeometry(78, 32, 32);
    const glowMaterial = new THREE.MeshBasicMaterial({
      color: 0x60a5fa,
      transparent: true,
      opacity: 0.1,
      side: THREE.BackSide
    });
    const glowSphere = new THREE.Mesh(glowGeometry, glowMaterial);
    scene.add(glowSphere);

    // Orbiting particles
    const particleCount = 200;
    const particles = [];
    const particleGeometry = new THREE.BufferGeometry();
    const positions = new Float32Array(particleCount * 3);
    const colors = new Float32Array(particleCount * 3);

    for (let i = 0; i < particleCount; i++) {
      const theta = Math.random() * Math.PI * 2;
      const phi = Math.random() * Math.PI;
      const radius = 100 + Math.random() * 80;

      positions[i * 3] = radius * Math.sin(phi) * Math.cos(theta);
      positions[i * 3 + 1] = radius * Math.sin(phi) * Math.sin(theta);
      positions[i * 3 + 2] = radius * Math.cos(phi);

      const colorChoice = Math.random();
      if (colorChoice < 0.33) {
        colors[i * 3] = 0.23; colors[i * 3 + 1] = 0.51; colors[i * 3 + 2] = 0.96;
      } else if (colorChoice < 0.66) {
        colors[i * 3] = 0.54; colors[i * 3 + 1] = 0.36; colors[i * 3 + 2] = 0.96;
      } else {
        colors[i * 3] = 0.06; colors[i * 3 + 1] = 0.71; colors[i * 3 + 2] = 0.83;
      }

      particles.push({
        theta,
        phi,
        radius,
        speed: 0.001 + Math.random() * 0.002
      });
    }

    particleGeometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
    particleGeometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));

    const particleMaterial = new THREE.PointsMaterial({
      size: 3,
      vertexColors: true,
      transparent: true,
      opacity: 0.8,
      blending: THREE.AdditiveBlending
    });

    const particleSystem = new THREE.Points(particleGeometry, particleMaterial);
    scene.add(particleSystem);

    // Connection lines
    const lineGeometry = new THREE.BufferGeometry();
    const linePositions = new Float32Array(100 * 3);
    lineGeometry.setAttribute('position', new THREE.BufferAttribute(linePositions, 3));
    
    const lineMaterial = new THREE.LineBasicMaterial({
      color: 0x3b82f6,
      transparent: true,
      opacity: 0.3,
      blending: THREE.AdditiveBlending
    });
    
    const lines = new THREE.LineSegments(lineGeometry, lineMaterial);
    scene.add(lines);

    // Mouse interaction
    let mouseX = 0;
    let mouseY = 0;
    let targetX = 0;
    let targetY = 0;

    document.addEventListener('mousemove', (event) => {
      mouseX = (event.clientX / window.innerWidth) * 2 - 1;
      mouseY = -(event.clientY / window.innerHeight) * 2 + 1;
    });

    // Stats animation
    let frame = 0;
    const animateStats = () => {
      if (frame < 100) {
        document.getElementById('stat-nodes').textContent = Math.floor((frame / 100) * 847);
        document.getElementById('stat-connections').textContent = Math.floor((frame / 100) * 2453);
        document.getElementById('stat-data').textContent = (Math.floor((frame / 100) * 18.4 * 10) / 10) + 'TB';
        frame++;
      }
    };

    // Animation loop
    function animate() {
      requestAnimationFrame(animate);

      // Smooth mouse follow
      targetX = mouseX * 0.3;
      targetY = mouseY * 0.3;
      globe.rotation.y += (targetX - globe.rotation.y) * 0.05;
      globe.rotation.x += (targetY - globe.rotation.x) * 0.05;

      // Auto rotation
      globe.rotation.y += 0.002;
      glowSphere.rotation.y -= 0.001;

      // Update particles
      const positions = particleSystem.geometry.attributes.position.array;
      particles.forEach((particle, i) => {
        particle.theta += particle.speed;
        
        positions[i * 3] = particle.radius * Math.sin(particle.phi) * Math.cos(particle.theta);
        positions[i * 3 + 1] = particle.radius * Math.sin(particle.phi) * Math.sin(particle.theta);
        positions[i * 3 + 2] = particle.radius * Math.cos(particle.phi);
      });
      particleSystem.geometry.attributes.position.needsUpdate = true;

      // Update connection lines
      const linePositions = lines.geometry.attributes.position.array;
      for (let i = 0; i < 50; i++) {
        const idx1 = Math.floor(Math.random() * particleCount) * 3;
        const idx2 = Math.floor(Math.random() * particleCount) * 3;
        
        linePositions[i * 6] = positions[idx1];
        linePositions[i * 6 + 1] = positions[idx1 + 1];
        linePositions[i * 6 + 2] = positions[idx1 + 2];
        linePositions[i * 6 + 3] = positions[idx2];
        linePositions[i * 6 + 4] = positions[idx2 + 1];
        linePositions[i * 6 + 5] = positions[idx2 + 2];
      }
      lines.geometry.attributes.position.needsUpdate = true;

      animateStats();
      renderer.render(scene, camera);
    }

    animate();

    // Resize handler
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
